      value: "Feedback"

# 关于入口
about_entry:
  ios:
    main:
      type: xpath
      value: "//XCUIElementTypeStaticText[@name='About']/parent::XCUIElementTypeOther"

# 关于标题
about_title:
  ios:
    main:
      type: accessibility_id
      value: "About"

# 最近阅读卡片区域
recent_read_card:
  ios:
    main:
      type: xpath
      value: "//XCUIElementTypeButton[@name='nl close small']/parent::XCUIElementTypeOther"

# 最近阅读关闭按钮
recent_read_close_button:
  ios:
    main:
      type: accessibility_id
      value: "nl close small"


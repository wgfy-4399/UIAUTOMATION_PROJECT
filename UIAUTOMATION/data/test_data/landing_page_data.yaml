# 通用配置
timeout: 15  # 页面加载超时（页面有较多脚本，延长至15秒）
call_wait_time: 8  # 点击后等待APP启动（页面跳转有3秒延迟，延长至8秒）
scroll_to_bottom: true  # 是否滚动到页面底部（触发悬浮按钮/统计事件）
param_replace_pattern: "{{(.*?)}}"
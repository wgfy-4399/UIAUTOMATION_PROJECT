    ios:
      url_template: "https://fqwebsite.lin47.com/share/middle/ofgublg3mpues0glbq4qoirx?campaign_id={{campaign.id}}&adset_id={{adset.id}}&ad_id={{ad.id}}&campaign={{campaign.name}}&adgroup={{adset.name}}"
      test_params:

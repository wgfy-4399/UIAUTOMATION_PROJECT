[pytest]
# 失败重跑配置
reruns = 2          # 全局失败重跑次数
reruns_delay = 3    # 重跑间隔（秒）
# 保留你原有配置（比如testpaths、python_files等）
testpaths = case
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    smoke: 冒烟测试（核心功能验证）
    regression: 回归测试（全量功能验证）
    e2e: 端到端测试（完整用户旅程）
    vest: 马甲包专属测试